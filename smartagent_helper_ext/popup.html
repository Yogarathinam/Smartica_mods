<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAgent Helper - Popup</title>
    <link href="tailwind.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom toggle switch styling */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #6366f1; /* indigo-500 */
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #6366f1; /* indigo-500 */
        }
        .toggle-checkbox {
            right: 0;
            z-index: 1;
            border-color: #475569; /* slate-600 */
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toggle-label {
            background-color: #334155; /* slate-700 */
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans w-[320px] overflow-hidden m-0 select-none">
    
    <div class="p-4 flex flex-col gap-4">
        
        <div class="flex items-center justify-between border-b border-slate-700 pb-3">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center border border-indigo-500/50">
                    <i class="fa-solid fa-robot text-indigo-400 text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-sm tracking-wide text-white leading-tight">SmartAgent</h1>
                    <span class="text-[10px] text-slate-400 font-medium tracking-wider uppercase">Helper Extension</span>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 p-3 shadow-inner relative overflow-hidden group">
            <div id="status-glow" class="absolute -top-4 -right-4 w-16 h-16 bg-rose-500/10 rounded-full blur-xl transition-colors duration-500"></div>
            
            <div class="relative z-10 flex flex-col gap-3">
                <div class="flex items-start justify-between">
                    <div class="w-full mr-2">
                        <div class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-0.5">WebSocket Server</div>
                        <input type="text" id="ws-url" value="ws://127.0.0.1:8765/ws" class="w-full text-xs font-mono text-slate-300 bg-slate-900 px-2 py-1 rounded border border-slate-700 outline-none focus:border-indigo-500 transition-colors">
                    </div>
                    
                    <div class="flex items-center gap-1.5 bg-slate-900 px-2 py-1 rounded-md border border-slate-700 shadow-sm mt-4">
                        <div class="relative flex h-2 w-2">
                            <span id="conn-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                            <span id="conn-orb" class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span>
                        </div>
                        <span id="conn-text" class="text-[10px] font-bold uppercase tracking-wider text-slate-300">Offline</span>
                    </div>
                </div>

                <button id="main-conn-btn" class="w-full py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-300 bg-indigo-600 hover:bg-indigo-500 text-white shadow-[0_0_15px_rgba(79,70,229,0.3)] border border-indigo-500">
                    Connect to Server
                </button>
            </div>
        </div>

        <div class="flex flex-col gap-1 bg-slate-800/50 rounded-xl border border-slate-700/50 p-2">
            
            <div id="container-toggle-page" class="flex items-center justify-between p-2 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                <div class="flex items-center gap-2.5">
                    <i class="fa-solid fa-file-code text-slate-400 w-4 text-center"></i>
                    <div class="flex flex-col">
                        <span class="text-xs font-medium text-slate-200">Enable on this page</span>
                        <span class="text-[9px] text-slate-500">Inject scripts into current tab</span>
                    </div>
                </div>
                <div class="relative inline-block w-8 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" id="toggle-page" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer" checked/>
                    <label for="toggle-page" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-700 cursor-pointer"></label>
                </div>
            </div>

            <div id="container-toggle-floating" class="flex items-center justify-between p-2 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                <div class="flex items-center gap-2.5">
                    <i class="fa-solid fa-window-restore text-slate-400 w-4 text-center"></i>
                    <div class="flex flex-col">
                        <span class="text-xs font-medium text-slate-200">Floating UI</span>
                        <span class="text-[9px] text-slate-500">Show control bubble on screen</span>
                    </div>
                </div>
                <div class="relative inline-block w-8 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" id="toggle-floating" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer" checked/>
                    <label for="toggle-floating" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-700 cursor-pointer"></label>
                </div>
            </div>

            <div id="container-toggle-always-active" class="flex items-center justify-between p-2 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer border-t border-slate-700/50 mt-1 pt-3">
                <div class="flex items-center gap-2.5">
                    <i class="fa-solid fa-eye text-emerald-400 w-4 text-center"></i>
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-emerald-300">Always Active Window</span>
                        <span class="text-[9px] text-slate-500" id="current-hostname-label">Checking site...</span>
                    </div>
                </div>
                <div class="relative inline-block w-8 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" id="toggle-always-active" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                    <label for="toggle-always-active" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-700 cursor-pointer"></label>
                </div>
            </div>

        </div>

        <div class="flex items-center justify-between pt-1">
            <button id="ping-btn" class="text-[10px] text-slate-500 hover:text-indigo-400 transition-colors flex items-center gap-1 cursor-pointer">
                <i class="fa-solid fa-satellite-dish"></i> Ping Server
            </button>
            <span class="text-[10px] text-slate-600 font-mono">Combined v1.0.5</span>
        </div>

    </div>

    <script src="popup.js"></script>
</body>
</html>
